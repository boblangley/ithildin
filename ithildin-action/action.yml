name: 'Ithildin Static Site Build'
description: 'Build a static repository browser with Ithildin and upload dist as an artifact'
inputs:
  repository:
    description: 'Path to repository root'
    required: false
    default: '.'
  description:
    description: 'Repository description written to metadata.json'
    required: false
  categories:
    description: 'Repository categories as a JSON array or comma-separated list'
    required: false
  tags:
    description: 'Repository tags as a JSON array or comma-separated list'
    required: false
  theme:
    description: 'Visual theme (parchment, obsidian, arctic, ember, terminal)'
    required: false
    default: 'parchment'
  output:
    description: 'Output folder for generated static site'
    required: false
    default: 'dist'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      shell: bash
      run: cd ${{ github.action_path }}/.. && npm ci
    - name: Build static site
      shell: bash
      run: |
        args=(--repo "${{ inputs.repository }}" --out "${{ inputs.output }}")
        if [ -n "${{ inputs.description }}" ]; then
          args+=(--description "${{ inputs.description }}")
        fi
        if [ -n "${{ inputs.categories }}" ]; then
          args+=(--categories "${{ inputs.categories }}")
        fi
        if [ -n "${{ inputs.tags }}" ]; then
          args+=(--tags "${{ inputs.tags }}")
        fi
        if [ -n "${{ inputs.theme }}" ]; then
          args+=(--theme "${{ inputs.theme }}")
        fi
        node "${{ github.action_path }}/../bin/ithildin.js" "${args[@]}"
    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: ithildin-dist
        path: ${{ inputs.output }}
